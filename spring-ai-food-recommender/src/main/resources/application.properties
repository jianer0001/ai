spring:
  application:
    name: spring-ai-food-recommender
  
  # 数据库配置（请根据实际情况修改）
  datasource:
    url: jdbc:mysql://localhost:3306/food_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  
  ai:
    openai:
      api-key: ms-5791fb33-3531-4d84-937c-1e6348b046bd
      base-url: https://ms-ens-303d4eea-d371.api-inference.modelscope.cn/v1
      chat:
        options:
          model: qwen-max
          temperature: 0.7

# 服务器配置
server:
  port: 8080

# 日志配置
logging:
  level:
    com.example.foodai: DEBUG
    org.springframework.ai: DEBUG
