spring:
  application:
    name: spring-ai-food-recommender
  
  # 数据库配置（请根据实际情况修改）
  datasource:
    url: jdbc:mysql://localhost:3306/food_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:your-api-key-here}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7

# 服务器配置
server:
  port: 8080

# 日志配置
logging:
  level:
    com.example.foodai: DEBUG
    org.springframework.ai: DEBUG
